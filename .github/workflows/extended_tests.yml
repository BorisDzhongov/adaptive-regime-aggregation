name: Run Extended ARA Tests

on:
  push:
    paths:
      - "extended_tests/**"
      - ".github/workflows/extended_tests.yml"
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy

      - name: Run all extended tests
        run: |
          echo "Discovering test files..."
          find extended_tests -type f -name "*.py" | sort > test_list.txt
          cat test_list.txt

          echo ""
          echo "Running tests..."
          echo "=============================="

          while IFS= read -r f; do
            echo ""
            echo "=============================="
            echo "RUNNING: $f"
            echo "=============================="
            python "$f"
            echo "FINISHED: $f"
          done < test_list.txt

      - name: Show generated result files
        run: |
          echo "Generated files under extended_tests/results:"
          if [ -d extended_tests/results ]; then
            find extended_tests/results -type f | sort
          else
            echo "No extended_tests/results directory found."
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ara-extended-results
          path: extended_tests/results/**
          if-no-files-found: warn
