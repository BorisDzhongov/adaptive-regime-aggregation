name: Run Extended ARA Tests

on:
  push:
    paths:
      - "extended_tests/**"
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Run all extended tests
      run: |
        for f in extended_tests/**/*.py; do
          echo "Running $f"
          python "$f"
        done

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: ara-extended-results
        path: extended_tests/results
